<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>SPORT STORE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
    }

    /* CABECERA (SE MANTIENE COMO ANTES) */
    .header {
      background: url('https://images.unsplash.com/photo-1517836357463-d25dfeac3438') center/cover;
      height: 250px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header-content {
      background: rgba(0,0,0,0.6);
      padding: 15px 25px;
      border-radius: 10px;
    }

    h1 {
      margin: 0;
      font-size: 32px;
      letter-spacing: 2px;
    }

    h2 {
      margin-top: 10px;
      font-size: 20px;
    }

    /* ZONA DONDE IRÁN TUS IFRAMES */
    .contenido {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      padding: 40px 20px;
      min-height: 400px;
    }

  </style>
</head>
<body>

<div class="header">
  <div class="header-content">
    <h1>Online Shop</h1>
    <h3>Tu estilo empieza aquí</h3>
</div>
</div> <h5>Elige tu producto envia pedido y en 3 dias lo tienes en casa
 </h5>
<div class="contenido">

  <!-- 🔻 PEGA AQUÍ TUS IFRAMES / CATÁLOGO 🔻 -->
<div style="max-width:320px;font-family:Arial;padding:12px;position:relative;
background:linear-gradient(135deg,#1a1a1a,#2a2a2a,#111);
border-radius:14px;box-shadow:0 8px 20px rgba(0,0,0,0.5);text-align:left;">

<div style="width:100%;height:220px;border-radius:10px;
background:linear-gradient(135deg,#111,#1c1c1c);
display:flex;align-items:center;justify-content:center;
overflow:hidden;position:relative;">

<img id="img" src="https://i.imgur.com/OEN49Vg.png"
style="max-width:100%;max-height:100%;object-fit:contain;
transition:transform .4s ease;cursor:zoom-in;"
onmouseenter="this.style.transform='scale(1.25)'"
onmouseleave="this.style.transform='scale(1)'"
onclick="this.style.transform=this.style.transform==='scale(1.6)'?'scale(1)':'scale(1.6)'">

</div>

<button onclick="prev()" style="position:absolute;top:100px;left:6px;background:rgba(0,0,0,0.6);color:white;border:none;border-radius:50%;width:28px;height:28px;">‹</button>
<button onclick="next()" style="position:absolute;top:100px;right:6px;background:rgba(0,0,0,0.6);color:white;border:none;border-radius:50%;width:28px;height:28px;">›</button>

<h3 style="margin:10px 0 4px;font-size:16px;color:#ffffff;">💎Conjunto chandal corto (Pantalon, Camiseta) 37€</h3>
<p style="font-size:11px;color:#bdbdbd;margin:4px 0;">Ref: 00001</p>

<select id="color" onchange="cambiarColor()" style="width:100%;margin-top:6px;background:#2a2a2a;color:white;border:none;border-radius:6px;padding:8px;">
<option value="" selected>🎨 Color</option><option value="Blanco">Blanco</option><option value="Negro">Negro</option>
</select>

<select id="talla" style="width:100%;margin-top:5px;background:#2a2a2a;color:white;border:none;border-radius:6px;padding:8px;">
<option value="" selected>🏷️ Talla</option><option value="M">M</option><option value="L">L</option>
</select>

<details style="color:#e0e0e0;margin-top:6px;font-size:12px;">
<summary>🚨📦Dirección envío(Importante)</summary>

<input id="nombre" placeholder="Nombre">
<input id="telefonoCliente" placeholder="Teléfono">
<input id="direccion" placeholder="Dirección">
<input id="ciudad" placeholder="Ciudad">
<input id="cp" placeholder="CP">
</details>

<button onclick="enviar()" style="width:100%;margin-top:10px;background:#25D366;color:white;padding:12px;border:none;border-radius:8px;font-weight:bold;">
💬 WhatsApp
</button>

</div>

<script>
var i=0;
var productos=[{color:"Blanco",imagen:"https://i.imgur.com/OEN49Vg.png"},{color:"Negro",imagen:"https://i.imgur.com/gX9T6RS.png"}];

function actualizar(){
if(productos.length){
img.src=productos[i].imagen;
color.value=productos[i].color;
img.style.transform='scale(1)';
}
}

function next(){i=(i+1)%productos.length;actualizar();}
function prev(){i=(i-1+productos.length)%productos.length;actualizar();}

function cambiarColor(){
for(let x=0;x<productos.length;x++){
if(productos[x].color===color.value){i=x;actualizar();}
}
}

function enviar(){
var color=document.getElementById("color").value;
var talla=document.getElementById("talla").value;
var nombre=document.getElementById("nombre").value;
var telefonoCliente=document.getElementById("telefonoCliente").value;
var direccion=document.getElementById("direccion").value;
var ciudad=document.getElementById("ciudad").value;
var cp=document.getElementById("cp").value;

var msg =
"🛍️ PEDIDO\n\n"+
"Producto: Conjunto chandal corto (Pantalon, Camiseta)\n"+
"Precio: 37€\n"+
"Ref: 00001\n\n"+
"Color: "+color+"\n"+
"Talla: "+talla+"\n\n"+
"Nombre: "+nombre+"\n"+
"Tel: "+telefonoCliente+"\n"+
"Dirección: "+direccion+"\n"+
"Ciudad: "+ciudad+"\n"+
"CP: "+cp;

window.top.location.href = "https://wa.me/34607877328?text=" + encodeURIComponent(msg);
}

actualizar();
</script>

  <!-- 🔻 PEGA AQUÍ TUS IFRAMES / CATÁLOGO 🔻 -->

</div>

</body>
</html>
